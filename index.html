<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Listing & Rating</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🎬 Movie Listing App</h1>

<div class="controls">

<input type="text" id="search" placeholder="Search movie...">

<div class="filter">

<select id="genreFilter">
<option value="">All Genres</option>
<option value="28">Action</option>
<option value="35">Comedy</option>
<option value="18">Drama</option>
<option value="27">Horror</option>
<option value="10749">Romance</option>
</select>

<select id="yearFilter">
<option value="">All Years</option>
<option value="2025">2025</option>
<option value="2024">2024</option>
<option value="2023">2023</option>
<option value="2022">2022</option>
</select>

<select id="sortFilter">
<option value="popularity.desc">Most Popular</option>
<option value="vote_average.desc">Highest Rating</option>
<option value="release_date.desc">Latest Release</option>
</select>

</div>
</div>
</header>

<div class="movie-container" id="movies"></div>
<!-- Trailer Modal -->
<div id="trailerModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeTrailer()">&times;</span>
<iframe id="trailerFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>
</div>
<script src="script.js"></script>

</body>
</html>
